<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Frontend-Backend</title>
</head>
<body>
    <h1>Teste de Integração Frontend-Backend</h1>
    <button id="test-btn">Testar Geração SCORM</button>
    <div id="result"></div>

    <script>
        document.getElementById('test-btn').addEventListener('click', async () => {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testando...';
            
            try {
                const curso = {
                    id: "teste-frontend",
                    titulo: "Curso de Teste Frontend",
                    descricao: "Testando integração",
                    cargaHoraria: "10 horas",
                    instrutor: "Teste",
                    modalidade: "EAD",
                    categoria: "Teste",
                    unidades: [
                        {
                            titulo: "Unidade 1",
                            conteudo: [
                                {
                                    tipo: "texto",
                                    conteudo: "Conteúdo de teste",
                                    colunas: 12
                                }
                            ]
                        }
                    ]
                };

                console.log('📦 [TEST] Enviando dados do curso para o backend...', curso);

                const response = await fetch('http://localhost:5001/api/generate-scorm', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ curso }),
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Erro ao gerar SCORM');
                }

                const blob = await response.blob();
                
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `${curso.titulo.replace(/[^a-zA-Z0-9]/g, "_")}_SCORM.zip`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                resultDiv.innerHTML = '✅ SCORM gerado com sucesso!';
                console.log('✅ [TEST] Pacote SCORM baixado com sucesso!');

            } catch (error) {
                console.error("❌ [TEST] Erro ao gerar SCORM:", error);
                resultDiv.innerHTML = `❌ Erro: ${error.message}`;
            }
        });
    </script>
</body>
</html>
